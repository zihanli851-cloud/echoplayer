        y: 138.14999999999992
      parameters:
        code: |-
            export default async function main(args) {
                // 1. 获取传入的数据，并进行空值保护（防止上游节点没传数据导致报错）
                const errors = args.error_data || [];
                const plagiarisms = args.plagiarism_data || [];

                // 2. 计算宏观查重率 (Dashboard 数据)
                let totalQuestions = plagiarisms.length;
                let highSimCount = 0;

                // 遍历查重结果，统计被判定为原题的数量 ("100%" 和 "90%-95%")
                plagiarisms.forEach(item => {
                    if (item && (item.similarity_level === "100%" || item.similarity_level === "90%-95%")) {
                        highSimCount++;
                    }
                });

                // 计算重复率百分比，保留两位小数
                let repeatRate = "0%";
                if (totalQuestions > 0) {
                    repeatRate = ((highSimCount / totalQuestions) * 100).toFixed(2) + "%";
                }

                // 3. 按照文档要求的结构，拼装最终的大 JSON
                const finalReport = {
                    "dashboard": {
                        "macro_repeat_rate": repeatRate,
                        "total_questions_checked": totalQuestions
                    },
                    "error_checklist": errors,
                    "plagiarism_details": plagiarisms
                };

                // 4. 返回结果
                // 注意：这里的 key 叫做 'output_report'，你需要在右侧面板配置对应的输出变量
                return {
                    output_report: finalReport
                };
            }
        language: 5
        node_inputs:
            - name: error_data
              input:
                type: list
                items:
                    type: object
                    properties:
                        correction_suggestio:
                            type: string
                            value: null
                        question_number:
                            type: integer
                            value: null
                        suspected_error:
                            type: string
                            value: null
                    value: null
                value:
                    path: error_list
                    ref_node: "194509"
            - name: plagiarism_data
              input:
                type: list
                items:
                    type: string
                    value: null
                value:
                    path: single_check_result
                    ref_node: "100170"
        node_outputs:
            output_report:
                type: object
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 60000
