<section class="section">
  <div class="section-head">
    <div>
      <h2>Dashboard</h2>
    </div>
  </div>

  <div class="dashboard">
    {% for card in dashboard_cards %}
    <article class="metric">
      <strong>{{ card.label }}</strong>
      <span>{{ card.value }}</span>
    </article>
    {% endfor %}
  </div>
</section>
